name: Publish package

on:
  push:
    branches: master

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Publish xbrl-accrual to GitHub Packages
        run: |
          mvn clean deploy \
            -DskipTests \
            -s .m2/settings.xml \
            --batch-mode \
            --errors \
            --fail-at-end \
            --show-version
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}